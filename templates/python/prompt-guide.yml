version: "1"

project:
  name: my-app
  type: python
  description: Python 프로젝트

tools:
  claude_code: true
  codex: false
  cursor: true

context:
  tech_stack:
    - Python 3.12
    - FastAPI
    - Pydantic

  summary: |
    FastAPI 백엔드. type hints 필수. ruff 포맷.

  path_rules:
    - name: python-src
      path: ["**/*.py"]
      content: |
        - type hints 필수
        - async 엔드포인트는 async def
        - bare except 금지

  skills: []
  agents: []
  forbidden:
    - "bare except"
    - "print() 디버그 로그 커밋"

  cursor:
    always_apply_rules: [core]

version: "1"

project:
  name: my-app
  type: ios-swift
  description: AlarmKit-based alarm app

tools:
  claude_code: true
  codex: false
  cursor: true

context:
  tech_stack:
    - SwiftUI
    - AlarmKit
    - LiveActivity
    - DynamicIsland

  summary: |
    AlarmKit-based iOS alarm app. SwiftUI + MVVM architecture.
    No force unwraps. Prefer async/await. Previews required.

  path_rules:
    - name: swift-ui
      path: ["**/*.swift"]
      description: SwiftUI and Swift file rules
      content: |
        - Prefer @Observable macro (avoid ObservableObject)
        - async/await required; Combine is migration-only
        - Include Preview on every View
        - MVVM: View is UI only; ViewModel holds business logic

    - name: alarmkit
      path: ["**/Alarm*.swift", "**/LiveActivity*.swift"]
      description: AlarmKit and LiveActivity file rules
      content: |
        - Prefer AlarmKit countdown (avoid fixed-time)
        - LiveActivity uses AlarmKit.AlarmActivity
        - Dynamic Island: implement compact, expanded, and minimal

    - name: tests
      path: ["**/*Tests.swift", "**/*Spec.swift"]
      content: |
        - Use XCTest
        - Each test runs independently
        - given/when/then comment structure

  skills:
    - name: generate-view
      description: Create SwiftUI view + ViewModel. Auto-invoke when editing Swift files.
      allowed_tools: [Read, Write, "Bash(swift:*)"]
      auto_invoke: true
      prompt: |
        Create a SwiftUI view using MVVM:
        1. Parse $ARGUMENTS for view name and data types
        2. Write ViewModel (@Observable) first
        3. Write View file (include Preview)
        4. Use PascalCase file names

    - name: review-pr
      description: PR code review. Invoke on request when diff is available.
      allowed_tools: [Read, "Bash(git:*)"]
      auto_invoke: false
      prompt: |
        Review the PR:
        1. Run git diff main to see changes
        2. Review architecture, performance, then security
        3. Summarize improvements in clear English

  agents:
    - name: reviewer
      description: Dedicated code review sub-agent
      tools: [Read, "Bash(git:*)"]
      prompt: |
        Review changed code and report improvements in English.
        Order: architecture → performance → security → style.

  hooks:
    post_write:
      - matcher: "Write|Edit"
        command: "swiftformat $CLAUDE_FILE_PATHS"
        timeout: 30
    pre_bash:
      - matcher: "Bash"
        command: ".claude/hooks/block-dangerous.sh"
        timeout: 5

  forbidden:
    - "Force unwrap (!)"
    - "Committing print() debug logs"
    - "Adding dependencies without approval"

  cursor:
    always_apply_rules: [core]

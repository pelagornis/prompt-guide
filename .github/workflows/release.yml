# Publish @pelagornis/prompt-guide to npm when a version tag is pushed.
#
# One-time npm setup (no NPM_TOKEN required):
#   @pelagornis/prompt-guide → Settings → Trusted publishers → GitHub Actions
#   - Repository: pelagornis/prompt-guide
#   - Workflow filename: release.yml
name: Release to npm

on:
  push:
    tags:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    name: Publish @pelagornis/prompt-guide to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        run: |
          npm install -g npm@latest
          node --version
          npm --version

      - name: Get version
        id: get_version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing @pelagornis/prompt-guide@$VERSION"

      - name: Update package version
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" packages/cli/package.json
          echo "Updated packages/cli/package.json to $VERSION"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: |
          unset NODE_AUTH_TOKEN
          pnpm --filter @pelagornis/prompt-guide publish --access public --no-git-checks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: v${{ steps.get_version.outputs.version }}
          body: |
            ## prompt-guide v${{ steps.get_version.outputs.version }}

            ### Install
            ```bash
            npm install -g @pelagornis/prompt-guide@${{ steps.get_version.outputs.version }}
            ```

            ### Usage
            ```bash
            prompt-guide init
            prompt-guide sync
            ```

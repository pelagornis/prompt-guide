version: "1"

project:
  name: my-app
  type: python
  description: Python project

tools:
  claude_code: true
  codex: false
  cursor: true

context:
  tech_stack:
    - Python 3.12
    - FastAPI
    - Pydantic

  summary: |
    FastAPI backend. Type hints required. ruff formatting.

  path_rules:
    - name: python-src
      path: ["**/*.py"]
      content: |
        - Type hints required
        - async endpoints use async def
        - No bare except

  skills: []
  agents: []
  forbidden:
    - "bare except"
    - "Committing print() debug logs"

  cursor:
    always_apply_rules: [core]

version: "1"

project:
  name: my-app
  type: web-react
  description: React web app

tools:
  claude_code: true
  codex: false
  cursor: true

context:
  tech_stack:
    - React
    - TypeScript
    - Vite

  summary: |
    React + TypeScript SPA. Functional components + hooks.
    No any types. Prefer Tailwind CSS.

  path_rules:
    - name: react-components
      path: ["**/*.{tsx,jsx}"]
      description: React component rules
      content: |
        - Functional components + hooks
        - Define props with interface
        - Avoid unnecessary useEffect

  skills: []
  agents: []
  forbidden:
    - "Using any type"
    - "Committing console.log"

  cursor:
    always_apply_rules: [core]
